name: Build project

on:
    push:
      branches: [ "main" ]
    pull_request:
      branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
    env:
      PARALLEL: -j 2
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: "recursive"
    - if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        sudo apt-get update
        sudo apt-get install --fix-missing xorg-dev libglfw3-dev libglew-dev libglm-dev libgl1-mesa-dev xorg-dev libxkbcommon-dev libwayland-dev
    - name: Prepare Vulkan SDK
      if: ${{ matrix.os == 'windows-latest' }}
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: latest
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true
    - if: ${{ matrix.os == 'windows-latest' }}
      name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - if: ${{ matrix.os == 'ubuntu-latest' }}
      name: Build library
      run: |
        cmake -B"build"
        cmake --build "build" --config ${{ matrix.build_type }} ${{ env.PARALLEL }}
    - name: Create Artifacts for ${{ matrix.os }}-${{ matrix.build_type }}
      uses: actions/upload-artifact@v4
      with:
        name: vklib-${{ matrix.os }}-${{ matrix.build_type }}
        path: "build/bin"
